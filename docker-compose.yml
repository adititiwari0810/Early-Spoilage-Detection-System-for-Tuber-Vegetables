services:
  mosquitto:
    image: eclipse-mosquitto:2.0
    container_name: potato_mosquitto
    ports:
      - "1883:1883"
      - "9001:9001"
    volumes:
      - ./mosquitto/config:/mosquitto/config
      - mosquitto_data:/mosquitto/data
      - mosquitto_log:/mosquitto/log
    restart: unless-stopped

  influxdb:
    image: influxdb:2.7
    container_name: potato_influxdb
    ports:
      - "8086:8086"
    environment:
      - DOCKER_INFLUXDB_INIT_MODE=setup
      - DOCKER_INFLUXDB_INIT_USERNAME=admin
      - DOCKER_INFLUXDB_INIT_PASSWORD=potato_influx_pass
      - DOCKER_INFLUXDB_INIT_ORG=potato_org
      - DOCKER_INFLUXDB_INIT_BUCKET=sensor_data
      - DOCKER_INFLUXDB_INIT_ADMIN_TOKEN=potato-influx-token-2024
    volumes:
      - influxdb_data:/var/lib/influxdb2
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    container_name: potato_postgres
    ports:
      - "5433:5432"
    environment:
      - POSTGRES_USER=potato_user
      - POSTGRES_PASSWORD=potato_pg_pass
      - POSTGRES_DB=potato_spoilage
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

volumes:
  mosquitto_data:
  mosquitto_log:
  influxdb_data:
  postgres_data:
